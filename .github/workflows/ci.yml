name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      MSYS2_ROOT: C:\msys64
      NODE_OPTIONS: --max-old-space-size=6144
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            cmake \
            curl \
            file \
            flex \
            libboost-all-dev \
            libicu-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            ninja-build \
            patchelf \
            wget

      - name: Install macOS FDE build dependencies
        if: runner.os == 'macOS'
        run: brew install boost bison flex icu4c ninja cmake

      - name: Setup MSYS2 FDE build environment
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            flex
            bison
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-zlib

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled Yosys toolchain
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        run: pnpm prepare:fde-bundle

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build

      - name: Frontend vitest regression
        run: pnpm exec vitest run

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    needs: checks
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      MSYS2_ROOT: C:\msys64
      NODE_OPTIONS: --max-old-space-size=6144
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            cmake \
            curl \
            file \
            flex \
            libboost-all-dev \
            libicu-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            ninja-build \
            patchelf \
            wget

      - name: Install macOS FDE build dependencies
        if: runner.os == 'macOS'
        run: brew install boost bison flex icu4c ninja cmake

      - name: Setup MSYS2 FDE build environment
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-boost
            flex
            bison
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-zlib

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled Yosys resources
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        run: pnpm prepare:fde-bundle

      - name: Build Tauri desktop app
        run: pnpm tauri build --debug --no-bundle --ci -c src-tauri/tauri.yosys.conf.json
