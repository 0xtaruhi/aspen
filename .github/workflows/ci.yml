name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NODE_OPTIONS: --max-old-space-size=6144
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            cmake \
            curl \
            file \
            flex \
            libboost-all-dev \
            libicu-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            ninja-build \
            patchelf \
            wget

      - name: Install macOS FDE build dependencies
        if: runner.os == 'macOS'
        run: brew install boost bison flex icu4c ninja cmake

      - name: Configure Windows FDE build environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
          }
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "FDE_VCPKG_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_BINARY_CACHE=$env:RUNNER_TEMP\vcpkg-binary-cache" >> $env:GITHUB_ENV

      - name: Cache Windows vcpkg binaries
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg-binary-cache
          key: windows-vcpkg-fde-${{ hashFiles('.github/workflows/ci.yml', 'scripts/prepare-fde-bundle.mjs') }}

      - name: Install Windows FDE build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          choco install winflexbison3 --no-progress -y
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet $env:FDE_VCPKG_TRIPLET `
            boost-date-time `
            boost-filesystem `
            boost-log `
            boost-program-options `
            boost-regex

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled Yosys toolchain
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        run: pnpm prepare:fde-bundle

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build

      - name: Frontend vitest regression
        run: pnpm exec vitest run

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

  desktop-build:
    name: Desktop Build (${{ matrix.os }})
    needs: checks
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      NODE_OPTIONS: --max-old-space-size=6144
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            cmake \
            curl \
            file \
            flex \
            libboost-all-dev \
            libicu-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            ninja-build \
            patchelf \
            wget

      - name: Install macOS FDE build dependencies
        if: runner.os == 'macOS'
        run: brew install boost bison flex icu4c ninja cmake

      - name: Configure Windows FDE build environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
          }
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "FDE_VCPKG_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_BINARY_CACHE=$env:RUNNER_TEMP\vcpkg-binary-cache" >> $env:GITHUB_ENV

      - name: Cache Windows vcpkg binaries
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg-binary-cache
          key: windows-vcpkg-fde-${{ hashFiles('.github/workflows/ci.yml', 'scripts/prepare-fde-bundle.mjs') }}

      - name: Install Windows FDE build dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          choco install winflexbison3 --no-progress -y
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet $env:FDE_VCPKG_TRIPLET `
            boost-date-time `
            boost-filesystem `
            boost-log `
            boost-program-options `
            boost-regex

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled Yosys resources
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        run: pnpm prepare:fde-bundle

      - name: Build Tauri desktop app
        run: pnpm tauri build --debug --no-bundle --ci -c src-tauri/tauri.yosys.conf.json
