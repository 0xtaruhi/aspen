name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FDE_SOURCE_REPO: 'https://github.com/0xtaruhi/FDE-Source.git'
  GITHUB_TOKEN: ${{ github.token }}
  NODE_OPTIONS: --max-old-space-size=6144
  OSS_CAD_SUITE_VERSION: '2026-03-17'

jobs:
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build

      - name: Frontend vitest regression
        run: pnpm test:ci

  toolchain-linux:
    name: Toolchains (ubuntu-22.04)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve FDE source revision
        id: fde-source
        shell: bash
        run: |
          sha=$(git ls-remote "$FDE_SOURCE_REPO" HEAD | cut -f1)
          if [ -z "$sha" ]; then
            echo "Failed to resolve FDE source revision." >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache bundled Yosys toolchain
        id: cache-yosys
        uses: actions/cache@v4
        with:
          path: src-tauri/vendor/yosys
          key: bundled-yosys-${{ runner.os }}-ubuntu-22.04-${{ env.OSS_CAD_SUITE_VERSION }}-${{ hashFiles('scripts/prepare-yosys-bundle.mjs') }}

      - name: Cache bundled FDE toolchain
        id: cache-fde
        uses: actions/cache@v4
        with:
          path: src-tauri/vendor/fde
          key: bundled-fde-${{ runner.os }}-ubuntu-22.04-${{ steps.fde-source.outputs.sha }}-${{ hashFiles('scripts/prepare-fde-bundle.mjs') }}

      - name: Install Linux toolchain dependencies
        if: steps.cache-fde.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            cmake \
            curl \
            file \
            flex \
            libboost-all-dev \
            libicu-dev \
            ninja-build \
            patchelf \
            wget

      - name: Download bundled Yosys toolchain
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        if: steps.cache-fde.outputs.cache-hit != 'true'
        run: pnpm prepare:fde-bundle

      - name: Upload bundled FPGA toolchains
        uses: actions/upload-artifact@v4
        with:
          name: bundled-fpga-toolchains-ubuntu-22.04
          path: |
            src-tauri/vendor/fde
            src-tauri/vendor/yosys
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  toolchain-macos:
    name: Toolchains (macos-latest)
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve FDE source revision
        id: fde-source
        shell: bash
        run: |
          sha=$(git ls-remote "$FDE_SOURCE_REPO" HEAD | cut -f1)
          if [ -z "$sha" ]; then
            echo "Failed to resolve FDE source revision." >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache bundled Yosys toolchain
        id: cache-yosys
        uses: actions/cache@v4
        with:
          path: src-tauri/vendor/yosys
          key: bundled-yosys-${{ runner.os }}-${{ env.OSS_CAD_SUITE_VERSION }}-${{ hashFiles('scripts/prepare-yosys-bundle.mjs') }}

      - name: Cache bundled FDE toolchain
        id: cache-fde
        uses: actions/cache@v4
        with:
          path: src-tauri/vendor/fde
          key: bundled-fde-${{ runner.os }}-${{ steps.fde-source.outputs.sha }}-${{ hashFiles('scripts/prepare-fde-bundle.mjs') }}

      - name: Install macOS toolchain dependencies
        if: steps.cache-fde.outputs.cache-hit != 'true'
        run: brew install boost bison flex icu4c ninja cmake

      - name: Download bundled Yosys toolchain
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        if: steps.cache-fde.outputs.cache-hit != 'true'
        run: pnpm prepare:fde-bundle

      - name: Upload bundled FPGA toolchains
        uses: actions/upload-artifact@v4
        with:
          name: bundled-fpga-toolchains-macos-latest
          path: |
            src-tauri/vendor/fde
            src-tauri/vendor/yosys
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  toolchain-windows:
    name: Toolchains (windows-latest)
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve FDE source revision
        id: fde-source
        shell: bash
        run: |
          sha=$(git ls-remote "$FDE_SOURCE_REPO" HEAD | cut -f1)
          if [ -z "$sha" ]; then
            echo "Failed to resolve FDE source revision." >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Cache bundled Yosys toolchain
        id: cache-yosys
        uses: actions/cache@v4
        with:
          path: src-tauri/vendor/yosys
          key: bundled-yosys-${{ runner.os }}-${{ env.OSS_CAD_SUITE_VERSION }}-${{ hashFiles('scripts/prepare-yosys-bundle.mjs') }}

      - name: Cache bundled FDE toolchain
        id: cache-fde
        uses: actions/cache@v4
        with:
          path: src-tauri/vendor/fde
          key: bundled-fde-${{ runner.os }}-${{ steps.fde-source.outputs.sha }}-${{ hashFiles('scripts/prepare-fde-bundle.mjs') }}

      - name: Configure Windows FDE build environment
        if: steps.cache-fde.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
          }
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "FDE_VCPKG_TRIPLET=x64-windows-static" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_BINARY_CACHE=$env:RUNNER_TEMP\vcpkg-binary-cache" >> $env:GITHUB_ENV

      - name: Restore Windows vcpkg binary cache
        if: steps.cache-fde.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\vcpkg-binary-cache
          key: windows-vcpkg-binary-cache-x64-windows-static-v2

      - name: Install Windows FDE build dependencies
        if: steps.cache-fde.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          choco install winflexbison3 --no-progress -y
          $chocoRoot = if ($env:ChocolateyInstall) { $env:ChocolateyInstall } else { 'C:\ProgramData\chocolatey' }
          foreach ($candidateDir in @("$chocoRoot\bin", "$chocoRoot\lib\winflexbison3\tools")) {
            if (Test-Path $candidateDir) {
              $candidateDir >> $env:GITHUB_PATH
            }
          }
          $winFlex = Join-Path $chocoRoot 'lib\winflexbison3\tools\win_flex.exe'
          $winBison = Join-Path $chocoRoot 'lib\winflexbison3\tools\win_bison.exe'
          if (Test-Path $winFlex) {
            "WIN_FLEX_PATH=$winFlex" >> $env:GITHUB_ENV
          }
          if (Test-Path $winBison) {
            "WIN_BISON_PATH=$winBison" >> $env:GITHUB_ENV
          }
          $vcpkgPackages = @(
            'boost-algorithm'
            'boost-any'
            'boost-assign'
            'boost-core'
            'boost-date-time'
            'boost-dynamic-bitset'
            'boost-filesystem'
            'boost-format'
            'boost-iostreams'
            'boost-iterator'
            'boost-lambda'
            'boost-lexical-cast'
            'boost-log'
            'boost-phoenix'
            'boost-pool'
            'boost-program-options'
            'boost-property-tree'
            'boost-ptr-container'
            'boost-random'
            'boost-range'
            'boost-regex'
            'boost-smart-ptr'
            'boost-spirit'
            'boost-timer'
            'boost-tokenizer'
            'boost-tuple'
          )
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet $env:FDE_VCPKG_TRIPLET @vcpkgPackages

      - name: Download bundled Yosys toolchain
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: pnpm prepare:yosys-bundle

      - name: Build bundled FDE toolchain
        if: steps.cache-fde.outputs.cache-hit != 'true'
        run: pnpm prepare:fde-bundle

      - name: Upload bundled FPGA toolchains
        uses: actions/upload-artifact@v4
        with:
          name: bundled-fpga-toolchains-windows-latest
          path: |
            src-tauri/vendor/fde
            src-tauri/vendor/yosys
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-22.04
    needs:
      - toolchain-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v4
        with:
          name: bundled-fpga-toolchains-ubuntu-22.04
          path: src-tauri/vendor

      - name: Restore bundled toolchain execute permissions
        run: bash scripts/restore-bundled-toolchain-perms.sh

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

  packages-linux:
    name: Aspen Packages (ubuntu-22.04)
    runs-on: ubuntu-22.04
    if: github.event_name != 'pull_request'
    needs:
      - frontend-checks
      - toolchain-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v4
        with:
          name: bundled-fpga-toolchains-ubuntu-22.04
          path: src-tauri/vendor

      - name: Restore bundled toolchain execute permissions
        run: bash scripts/restore-bundled-toolchain-perms.sh

      - name: Build Aspen installer packages
        run: pnpm tauri build --ci -v -b deb,rpm -c src-tauri/tauri.yosys.conf.json

      - name: Upload Aspen package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspen-packages-ubuntu-22.04
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  packages-macos:
    name: Aspen Packages (macos-latest)
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    needs:
      - frontend-checks
      - toolchain-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v4
        with:
          name: bundled-fpga-toolchains-macos-latest
          path: src-tauri/vendor

      - name: Restore bundled toolchain execute permissions
        run: bash scripts/restore-bundled-toolchain-perms.sh

      - name: Build Aspen installer packages
        run: pnpm tauri build --ci -v -b dmg -c src-tauri/tauri.yosys.conf.json

      - name: Verify Aspen macOS package
        shell: bash
        run: |
          set -euo pipefail
          dmg=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
          if [ -z "$dmg" ]; then
            echo "No DMG artifact found." >&2
            exit 1
          fi

          hdiutil verify "$dmg"

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" >/dev/null || true
            rmdir "$mount_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach -quiet -nobrowse -readonly -mountpoint "$mount_dir" "$dmg" >/dev/null
          test -f "$mount_dir/aspen.app/Contents/_CodeSignature/CodeResources"
          codesign --verify --deep --strict --verbose=4 "$mount_dir/aspen.app"

      - name: Upload Aspen package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspen-packages-macos-latest
          path: |
            src-tauri/target/release/bundle/**/*.dmg
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  packages-windows:
    name: Aspen Packages (windows-latest)
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    needs:
      - frontend-checks
      - toolchain-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v4
        with:
          name: bundled-fpga-toolchains-windows-latest
          path: src-tauri/vendor

      - name: Build Aspen installer packages
        run: pnpm tauri build --ci -v -c src-tauri/tauri.yosys.conf.json

      - name: Upload Aspen package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspen-packages-windows-latest
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - rust-checks
      - packages-linux
      - packages-macos
      - packages-windows
    permissions:
      contents: write
    steps:
      - name: Download Aspen package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aspen-packages-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Aspen ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.msi
            release-assets/**/*.exe
