name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ github.token }}
  GITHUB_TOKEN: ${{ github.token }}
  NODE_OPTIONS: --max-old-space-size=6144
  OSS_CAD_SUITE_VERSION: '2026-03-17'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
      toolchain: ${{ steps.filter.outputs.toolchain }}
      desktop: ${{ steps.filter.outputs.desktop }}
      force_full: ${{ steps.flags.outputs.force_full }}
      run_frontend: ${{ steps.flags.outputs.run_frontend }}
      run_rust: ${{ steps.flags.outputs.run_rust }}
      run_packages: ${{ steps.flags.outputs.run_packages }}
      run_toolchain_linux: ${{ steps.flags.outputs.run_toolchain_linux }}
      run_toolchain_macos: ${{ steps.flags.outputs.run_toolchain_macos }}
      run_toolchain_windows: ${{ steps.flags.outputs.run_toolchain_windows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
            rust:
              - 'src-tauri/build.rs'
              - 'src-tauri/src/**'
              - 'src-tauri/Cargo.toml'
              - 'src-tauri/Cargo.lock'
            toolchain:
              - 'scripts/prepare-yosys-bundle.mjs'
              - 'scripts/restore-bundled-toolchain-perms.sh'
              - 'src-tauri/resource/**'
            desktop:
              - 'src/**'
              - 'src-tauri/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'scripts/prepare-yosys-bundle.mjs'
              - 'scripts/restore-bundled-toolchain-perms.sh'

      - name: Compute CI matrix
        id: flags
        shell: bash
        run: |
          set -euo pipefail

          frontend="${{ steps.filter.outputs.frontend }}"
          rust="${{ steps.filter.outputs.rust }}"
          toolchain="${{ steps.filter.outputs.toolchain }}"
          desktop="${{ steps.filter.outputs.desktop }}"

          [ -n "$frontend" ] || frontend=false
          [ -n "$rust" ] || rust=false
          [ -n "$toolchain" ] || toolchain=false
          [ -n "$desktop" ] || desktop=false

          force_full=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            force_full=true
          fi

          run_frontend=false
          run_rust=false
          run_packages=false
          run_toolchain_linux=false
          run_toolchain_macos=false
          run_toolchain_windows=false

          if [ "$force_full" = true ]; then
            run_frontend=true
            run_rust=true
            run_packages=true
            run_toolchain_linux=true
            run_toolchain_macos=true
            run_toolchain_windows=true
          else
            if [ "$rust" = true ] || [ "$toolchain" = true ]; then
              run_rust=true
            fi

            if [ "$frontend" = true ]; then
              run_frontend=true
            fi

            if [ "$run_rust" = true ]; then
              run_toolchain_linux=true
            fi
          fi

          {
            echo "force_full=$force_full"
            echo "run_frontend=$run_frontend"
            echo "run_rust=$run_rust"
            echo "run_packages=$run_packages"
            echo "run_toolchain_linux=$run_toolchain_linux"
            echo "run_toolchain_macos=$run_toolchain_macos"
            echo "run_toolchain_windows=$run_toolchain_windows"
          } >> "$GITHUB_OUTPUT"

          echo "frontend=$frontend"
          echo "rust=$rust"
          echo "toolchain=$toolchain"
          echo "desktop=$desktop"
          echo "force_full=$force_full"
          echo "run_frontend=$run_frontend"
          echo "run_rust=$run_rust"
          echo "run_packages=$run_packages"
          echo "run_toolchain_linux=$run_toolchain_linux"
          echo "run_toolchain_macos=$run_toolchain_macos"
          echo "run_toolchain_windows=$run_toolchain_windows"

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.run_frontend == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build

      - name: Frontend vitest regression
        run: pnpm test:ci

  toolchain-linux:
    name: Toolchains (ubuntu-22.04)
    runs-on: ubuntu-22.04
    needs:
      - changes
    if: needs.changes.outputs.run_toolchain_linux == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache bundled Yosys toolchain
        id: cache-yosys
        uses: actions/cache@v5
        with:
          path: src-tauri/vendor/yosys
          key: bundled-yosys-${{ runner.os }}-ubuntu-22.04-${{ env.OSS_CAD_SUITE_VERSION }}-${{ hashFiles('scripts/prepare-yosys-bundle.mjs') }}

      - name: Download bundled Yosys toolchain
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: pnpm prepare:yosys-bundle

      - name: Upload bundled Yosys toolchain
        uses: actions/upload-artifact@v7
        with:
          name: bundled-fpga-toolchains-ubuntu-22.04
          path: |
            src-tauri/vendor/yosys
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  toolchain-macos:
    name: Toolchains (macos-latest)
    runs-on: macos-latest
    needs:
      - changes
    if: needs.changes.outputs.run_toolchain_macos == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache bundled Yosys toolchain
        id: cache-yosys
        uses: actions/cache@v5
        with:
          path: src-tauri/vendor/yosys
          key: bundled-yosys-${{ runner.os }}-${{ env.OSS_CAD_SUITE_VERSION }}-${{ hashFiles('scripts/prepare-yosys-bundle.mjs') }}

      - name: Download bundled Yosys toolchain
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: pnpm prepare:yosys-bundle

      - name: Upload bundled Yosys toolchain
        uses: actions/upload-artifact@v7
        with:
          name: bundled-fpga-toolchains-macos-latest
          path: |
            src-tauri/vendor/yosys
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  toolchain-windows:
    name: Toolchains (windows-latest)
    runs-on: windows-latest
    needs:
      - changes
    if: needs.changes.outputs.run_toolchain_windows == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache bundled Yosys toolchain
        id: cache-yosys
        uses: actions/cache@v5
        with:
          path: src-tauri/vendor/yosys
          key: bundled-yosys-${{ runner.os }}-${{ env.OSS_CAD_SUITE_VERSION }}-${{ hashFiles('scripts/prepare-yosys-bundle.mjs') }}

      - name: Download bundled Yosys toolchain
        if: steps.cache-yosys.outputs.cache-hit != 'true'
        run: pnpm prepare:yosys-bundle

      - name: Upload bundled Yosys toolchain
        uses: actions/upload-artifact@v7
        with:
          name: bundled-fpga-toolchains-windows-latest
          path: |
            src-tauri/vendor/yosys
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-22.04
    needs:
      - changes
      - toolchain-linux
    if: needs.changes.outputs.run_rust == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v8
        with:
          name: bundled-fpga-toolchains-ubuntu-22.04
          path: src-tauri/vendor/yosys

      - name: Restore bundled toolchain execute permissions
        run: bash scripts/restore-bundled-toolchain-perms.sh

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Rust test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

  packages-linux:
    name: Aspen Packages (ubuntu-22.04)
    runs-on: ubuntu-22.04
    needs:
      - changes
      - frontend-checks
      - toolchain-linux
    if: needs.changes.outputs.run_packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v8
        with:
          name: bundled-fpga-toolchains-ubuntu-22.04
          path: src-tauri/vendor/yosys

      - name: Restore bundled toolchain execute permissions
        run: bash scripts/restore-bundled-toolchain-perms.sh

      - name: Select Tauri config
        id: tauri_config
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "path=src-tauri/tauri.release.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=src-tauri/tauri.yosys.conf.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Aspen installer packages
        env:
          ASPEN_ENABLE_UPDATER: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --ci -v -b deb,rpm,appimage -c ${{ steps.tauri_config.outputs.path }}

      - name: Record updater target metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          case "${{ runner.arch }}" in
            X64) arch="x86_64" ;;
            ARM64) arch="aarch64" ;;
            *) echo "Unsupported runner arch: ${{ runner.arch }}" >&2; exit 1 ;;
          esac

          asset=$(find src-tauri/target/release/bundle -type f -name '*.AppImage' -print -quit)
          if [ -z "$asset" ]; then
            echo "No AppImage updater asset found." >&2
            exit 1
          fi

          mkdir -p release-metadata
          cat > "release-metadata/linux-${arch}.json" <<EOF
          {
            "platform": "linux-${arch}",
            "asset": "$(basename "$asset")"
          }
          EOF

      - name: Upload Aspen package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aspen-packages-ubuntu-22.04
          path: |
            release-metadata/*.json
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.AppImage.sig
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  packages-macos:
    name: Aspen Packages (macos-latest)
    runs-on: macos-latest
    needs:
      - changes
      - frontend-checks
      - toolchain-macos
    if: needs.changes.outputs.run_packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v8
        with:
          name: bundled-fpga-toolchains-macos-latest
          path: src-tauri/vendor/yosys

      - name: Restore bundled toolchain execute permissions
        run: bash scripts/restore-bundled-toolchain-perms.sh

      - name: Select Tauri config
        id: tauri_config
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "path=src-tauri/tauri.release.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=src-tauri/tauri.yosys.conf.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Aspen installer packages
        env:
          ASPEN_ENABLE_UPDATER: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --ci -v -b app,dmg -c ${{ steps.tauri_config.outputs.path }}

      - name: Record updater target metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          case "${{ runner.arch }}" in
            X64) arch="x86_64" ;;
            ARM64) arch="aarch64" ;;
            *) echo "Unsupported runner arch: ${{ runner.arch }}" >&2; exit 1 ;;
          esac

          asset=$(find src-tauri/target/release/bundle -type f -name '*.app.tar.gz' -print -quit)
          if [ -z "$asset" ]; then
            echo "No macOS updater asset found." >&2
            exit 1
          fi

          mkdir -p release-metadata
          cat > "release-metadata/darwin-${arch}.json" <<EOF
          {
            "platform": "darwin-${arch}",
            "asset": "$(basename "$asset")"
          }
          EOF

      - name: Verify Aspen macOS package
        shell: bash
        run: |
          set -euo pipefail
          dmg=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
          if [ -z "$dmg" ]; then
            echo "No DMG artifact found." >&2
            exit 1
          fi

          hdiutil verify "$dmg"

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" >/dev/null || true
            rmdir "$mount_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach -quiet -nobrowse -readonly -mountpoint "$mount_dir" "$dmg" >/dev/null
          test -f "$mount_dir/aspen.app/Contents/_CodeSignature/CodeResources"
          test -f "$mount_dir/aspen.app/Contents/Resources/vendor/yosys/bin/yosys"
          codesign --verify --deep --strict --verbose=4 "$mount_dir/aspen.app"

      - name: Upload Aspen package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aspen-packages-macos-latest
          path: |
            release-metadata/*.json
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/release/bundle/**/*.dmg
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  packages-windows:
    name: Aspen Packages (windows-latest)
    runs-on: windows-latest
    needs:
      - changes
      - frontend-checks
      - toolchain-windows
    if: needs.changes.outputs.run_packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download bundled FPGA toolchains
        uses: actions/download-artifact@v8
        with:
          name: bundled-fpga-toolchains-windows-latest
          path: src-tauri/vendor/yosys

      - name: Select Tauri config
        id: tauri_config
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "path=src-tauri/tauri.release.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=src-tauri/tauri.yosys.conf.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Aspen installer packages
        env:
          ASPEN_ENABLE_UPDATER: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --ci -v -c ${{ steps.tauri_config.outputs.path }}

      - name: Record updater target metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail

          case "${{ runner.arch }}" in
            X64) arch="x86_64" ;;
            ARM64) arch="aarch64" ;;
            *) echo "Unsupported runner arch: ${{ runner.arch }}" >&2; exit 1 ;;
          esac

          asset=$(find src-tauri/target/release/bundle -type f -name '*-setup.exe' -print -quit)
          if [ -z "$asset" ]; then
            asset=$(find src-tauri/target/release/bundle -type f -name '*.msi' -print -quit)
          fi
          if [ -z "$asset" ]; then
            echo "No Windows updater asset found." >&2
            exit 1
          fi

          mkdir -p release-metadata
          cat > "release-metadata/windows-${arch}.json" <<EOF
          {
            "platform": "windows-${arch}",
            "asset": "$(basename "$asset")"
          }
          EOF

      - name: Upload Aspen package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aspen-packages-windows-latest
          path: |
            release-metadata/*.json
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.sig
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.sig
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - changes
      - rust-checks
      - packages-linux
      - packages-macos
      - packages-windows
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Aspen package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: aspen-packages-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Generate updater manifest
        run: |
          python3 scripts/generate_updater_manifest.py \
            --assets-dir release-assets \
            --repo 0xtaruhi/aspen \
            --tag "${GITHUB_REF_NAME}" \
            --out release-assets/latest.json

      - name: Show updater manifest
        run: cat release-assets/latest.json

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t release_files < <(
            find release-assets -type f \
              \( -name '*.dmg' \
              -o -name '*.deb' \
              -o -name '*.rpm' \
              -o -name '*.msi' \
              -o -name '*.exe' \
              -o -name '*.app.tar.gz' \
              -o -name '*.AppImage' \
              -o -name '*.sig' \
              -o -name 'latest.json' \) \
              | sort
          )

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${release_files[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --title "Aspen ${GITHUB_REF_NAME}"
          else
            gh release create "${GITHUB_REF_NAME}" "${release_files[@]}" \
              --title "Aspen ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
